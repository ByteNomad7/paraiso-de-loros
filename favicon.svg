<?xml version="1.0" encoding="UTF-8"?>
<!--
  Paraíso de Aves — Favicon
  Bold macaw head · thick gold ring · dark green BG
  No text · No leaf · No body
  Optimised for 16×16 / 32×32 / 48×48
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="fc">
      <circle cx="50" cy="50" r="49"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="50" cy="50" r="50" fill="#183C2E"/>

  <!-- THICK gold ring — dominant at small sizes -->
  <circle cx="50" cy="50" r="44" fill="none"
          stroke="#C89B3C" stroke-width="9"/>

  <!-- GOLD HEAD (macaw facing upper-right) -->
  <path d="M 68 20
           C 62 14 54 10 44 10
           C 36 10 28 14 24 22
           C 18 30 14 40 14 50
           C 12 62 16 74 24 80
           C 30 86 40 88 50 86
           C 60 84 70 78 74 70
           C 78 62 80 52 78 44
           C 76 38 74 32 72 30
           C 68 28 66 24 68 20 Z"
        fill="#C89B3C" clip-path="url(#fc)"/>

  <!-- GREEN HEAD CAP -->
  <path d="M 36 14
           C 36 6 44 4 52 6
           C 60 8 66 12 68 20
           C 68 24 64 26 60 26
           C 52 26 44 24 40 20
           C 38 18 36 16 36 14 Z"
        fill="#183C2E" clip-path="url(#fc)"/>

  <!-- IVORY FACE PATCH -->
  <ellipse cx="68" cy="38" rx="7" ry="10"
           fill="#F8F5EF"
           transform="rotate(-30 68 38)"
           clip-path="url(#fc)"/>

  <!-- UPPER BEAK — large hook, most recognisable macaw feature -->
  <path d="M 64 22
           C 68 14 76 10 82 16
           C 86 20 86 28 82 32
           C 78 28 74 26 70 28
           C 68 28 66 26 64 22 Z"
        fill="#0C0904" clip-path="url(#fc)"/>

  <!-- LOWER BEAK HOOK -->
  <path d="M 80 32
           C 82 38 80 46 74 48
           C 70 48 68 44 70 38
           C 72 34 76 32 80 32 Z"
        fill="#0C0904" clip-path="url(#fc)"/>

  <!-- EYE — visible even at 16px -->
  <circle cx="54" cy="28" r="6.5"  fill="#0C0904" clip-path="url(#fc)"/>
  <circle cx="54" cy="28" r="3"    fill="#F8F5EF" clip-path="url(#fc)"/>
  <circle cx="55.5" cy="26.5" r="1.2" fill="#0C0904" clip-path="url(#fc)"/>

</svg>
