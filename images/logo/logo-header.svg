<?xml version="1.0" encoding="UTF-8"?>
<!--
  Paraíso de Aves — Primary Header Logo
  Colors: Forest Green #183C2E · Luxury Gold #C89B3C · Ivory #F8F5EF
  viewBox 0 0 300 80 — display at height:60px → ~225px wide
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80"
     role="img" aria-label="Paraíso de Aves">
  <title>Paraíso de Aves</title>

  <!-- ════════════════════════════════
       ICON MARK  (80×80 region)
       All macaw paths are in 100×100 space,
       scaled ×0.8 from origin → fits inside 80×80
       ════════════════════════════════ -->
  <g transform="scale(0.8)">

    <!-- Background circle -->
    <circle cx="50" cy="50" r="50" fill="#183C2E"/>

    <!-- Premium thick gold ring -->
    <circle cx="50" cy="50" r="46" fill="none" stroke="#C89B3C" stroke-width="7"/>

    <!-- Subtle inner accent ring -->
    <circle cx="50" cy="50" r="39.5" fill="none" stroke="#C89B3C"
            stroke-width="0.9" opacity="0.28"/>

    <!-- ── MACAW (facing upper-right) ── -->

    <!-- GOLD BODY — full silhouette, single path -->
    <path d="M 68 20
             C 62 14 54 10 44 10
             C 36 10 28 14 24 22
             C 18 30 14 40 14 50
             C 12 62 16 74 24 80
             C 30 86 40 88 50 86
             C 60 84 70 78 74 70
             C 78 62 80 52 78 44
             C 76 38 74 32 72 30
             C 68 28 66 24 68 20 Z"
          fill="#C89B3C"/>

    <!-- GREEN HEAD CAP — overlays crown -->
    <path d="M 36 14
             C 36 6 44 4 52 6
             C 60 8 66 12 68 20
             C 68 24 64 26 60 26
             C 52 26 44 24 40 20
             C 38 18 36 16 36 14 Z"
          fill="#183C2E"/>

    <!-- IVORY FACE PATCH — bare cheek skin -->
    <ellipse cx="68" cy="38" rx="7" ry="10"
             fill="#F8F5EF" transform="rotate(-30 68 38)"/>

    <!-- UPPER BEAK — large hooked mandible -->
    <path d="M 64 22
             C 68 14 76 10 82 16
             C 86 20 86 28 82 32
             C 78 28 74 26 70 28
             C 68 28 66 26 64 22 Z"
          fill="#0C0904"/>

    <!-- LOWER BEAK — hook curls toward chin -->
    <path d="M 80 32
             C 82 38 80 46 74 48
             C 70 48 68 44 70 38
             C 72 34 76 32 80 32 Z"
          fill="#0C0904"/>

    <!-- EYE — bold dot with ivory highlight -->
    <circle cx="54" cy="28" r="6"   fill="#0C0904"/>
    <circle cx="54" cy="28" r="2.8" fill="#F8F5EF"/>
    <circle cx="55.5" cy="26.5" r="1.1" fill="#0C0904"/>

    <!-- FEATHER DETAIL — 2 minimal bold arcs on body -->
    <path d="M 44 64 C 40 72 36 78 30 84"
          fill="none" stroke="#183C2E" stroke-width="4" stroke-linecap="round"/>
    <path d="M 54 68 C 50 76 46 80 40 86"
          fill="none" stroke="#183C2E" stroke-width="3" stroke-linecap="round"/>

    <!-- TROPICAL LEAF — simplified monstera -->
    <path d="M 60 72 C 72 66 82 72 80 86 C 72 90 62 84 60 72 Z"
          fill="#183C2E"/>
    <path d="M 56 80 C 64 76 68 86 62 90 C 58 90 56 86 56 80 Z"
          fill="#183C2E"/>
    <!-- Leaf vein accent -->
    <path d="M 67 75 C 72 78 76 83 74 88"
          fill="none" stroke="#0C1E14" stroke-width="1.5" stroke-linecap="round"/>

  </g><!-- end scale(0.8) -->

  <!-- ════════════════════════════════
       VERTICAL SEPARATOR
       ════════════════════════════════ -->
  <line x1="88" y1="11" x2="88" y2="69"
        stroke="#C89B3C" stroke-width="1" opacity="0.45"/>

  <!-- ════════════════════════════════
       WORDMARK
       ════════════════════════════════ -->

  <!-- PARAÍSO — hero, bold, ivory -->
  <text x="98" y="47"
        font-family="'Playfair Display','Palatino Linotype','Book Antiqua',Georgia,serif"
        font-size="40" font-weight="700" letter-spacing="1.5"
        fill="#F8F5EF">PARAÍSO</text>

  <!-- de Aves — secondary, lighter, gold -->
  <text x="100" y="66"
        font-family="'Playfair Display','Palatino Linotype','Book Antiqua',Georgia,serif"
        font-size="19" font-weight="400" letter-spacing="5"
        fill="#C89B3C">de Aves</text>

</svg>
