<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"
     role="img" aria-label="Paraíso de Aves — emblem mark">
  <title>Paraíso de Aves — Emblem</title>
  <defs>
    <linearGradient id="gH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6B5118"/>
      <stop offset="35%"  stop-color="#E8C97A"/>
      <stop offset="65%"  stop-color="#D4AB52"/>
      <stop offset="100%" stop-color="#6B5118"/>
    </linearGradient>
    <linearGradient id="gV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F4E49C"/>
      <stop offset="45%"  stop-color="#C9A24B"/>
      <stop offset="100%" stop-color="#7A5E1A"/>
    </linearGradient>
    <linearGradient id="gFL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#F4E49C"/>
      <stop offset="100%" stop-color="#9B7A2A"/>
    </linearGradient>
    <linearGradient id="gFR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F4E49C"/>
      <stop offset="100%" stop-color="#9B7A2A"/>
    </linearGradient>
    <radialGradient id="bgR" cx="50%" cy="34%" r="68%">
      <stop offset="0%"   stop-color="#254637"/>
      <stop offset="100%" stop-color="#0C1C11"/>
    </radialGradient>
    <path id="tArcB" d="M 20 100 A 80 80 0 0 0 180 100"/>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="#060E08"/>
  <circle cx="100" cy="100" r="98"  fill="url(#bgR)"/>

  <!-- Rings -->
  <circle cx="100" cy="100" r="97" fill="none" stroke="url(#gH)" stroke-width="2"/>
  <circle cx="100" cy="100" r="86" fill="none" stroke="#C9A24B"
          stroke-width="0.65" stroke-dasharray="2.2 3.5" opacity="0.50"/>

  <!-- Gold arc — rainbow motif -->
  <path d="M 31 68 A 76 76 0 0 1 169 68"
        fill="none" stroke="url(#gH)" stroke-width="6.5" stroke-linecap="round"/>
  <path d="M 38 76 A 69 69 0 0 1 162 76"
        fill="none" stroke="#C9A24B" stroke-width="0.9" stroke-linecap="round" opacity="0.25"/>

  <!-- Three macaw tail feathers — base at (100,148) -->
  <!-- Centre -->
  <path d="M 97 148 C 92 112 95 74 100 36 C 105 74 108 112 103 148 Z" fill="url(#gV)"/>
  <line x1="100" y1="148" x2="100" y2="38" stroke="#F5EAB8" stroke-width="0.4" opacity="0.32"/>
  <!-- Left -->
  <path d="M 97 148 C 92 112 95 74 100 36 C 105 74 108 112 103 148 Z"
        fill="url(#gFL)" opacity="0.82" transform="rotate(-27 100 148)"/>
  <!-- Right -->
  <path d="M 97 148 C 92 112 95 74 100 36 C 105 74 108 112 103 148 Z"
        fill="url(#gFR)" opacity="0.82" transform="rotate(27 100 148)"/>

  <!-- Quill knot -->
  <ellipse cx="100" cy="150" rx="5.5" ry="2.8" fill="#C9A24B" opacity="0.50"/>
  <circle  cx="100" cy="148" r="2.4" fill="url(#gV)"/>

  <!-- Leaf accents -->
  <path d="M 40 128 C 22 112 24 90 39 80 C 48 92 50 112 40 128 Z"
        fill="#192F22" stroke="#2A4E37" stroke-width="0.8"/>
  <path d="M 40 128 C 27 110 28 92 39 80"
        fill="none" stroke="#3D6648" stroke-width="0.55" opacity="0.5"/>
  <path d="M 160 128 C 178 112 176 90 161 80 C 152 92 150 112 160 128 Z"
        fill="#192F22" stroke="#2A4E37" stroke-width="0.8"/>
  <path d="M 160 128 C 173 110 172 92 161 80"
        fill="none" stroke="#3D6648" stroke-width="0.55" opacity="0.5"/>

  <!-- Bottom curved text -->
  <text font-family="'Palatino Linotype','Book Antiqua',Palatino,Georgia,serif"
        font-size="9.5" font-weight="600" letter-spacing="2.4"
        fill="url(#gH)" opacity="0.90">
    <textPath href="#tArcB" startOffset="50%" text-anchor="middle">PARAÍSO · DE · AVES</textPath>
  </text>

  <!-- Small ornaments -->
  <circle cx="100" cy="18"  r="1.8" fill="#C9A24B" opacity="0.55"/>
  <circle cx="26"  cy="68"  r="1.2" fill="#C9A24B" opacity="0.38"/>
  <circle cx="174" cy="68"  r="1.2" fill="#C9A24B" opacity="0.38"/>
</svg>
