    <path id="scTop" d="M 18 120 A 102 102 0 0 1 222 120"/>
    <path id="scBot" d="M 18 120 A 102 102 0 0 0 222 120"/>
  </defs>

  <circle cx="120" cy="120" r="119" fill="#060E08"/>
  <circle cx="120" cy="120" r="117" fill="url(#scbg)"/>
  <circle cx="120" cy="120" r="116" fill="none" stroke="url(#scgH)" stroke-width="3"/>
  <circle cx="120" cy="120" r="110" fill="none" stroke="#060E08" stroke-width="6"/>
  <circle cx="120" cy="120" r="107" fill="none" stroke="#C9A24B"
