  </text>

  <circle cx="120" cy="120" r="92" fill="none" stroke="url(#scgH)" stroke-width="1.3"/>
  <circle cx="120" cy="120" r="89" fill="none" stroke="#C9A24B" stroke-width="0.4" opacity="0.28"/>

