<?xml version="1.0" encoding="UTF-8"?>
<!-- Paraíso de Aves — Primary Logo (horizontal, for dark backgrounds) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 140"
     role="img" aria-label="Paraíso de Aves — primary logo">
  <title>Paraíso de Aves</title>
  <defs>
    <linearGradient id="plgH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6B5118"/>
      <stop offset="40%"  stop-color="#E8C97A"/>
      <stop offset="60%"  stop-color="#D4AB52"/>
      <stop offset="100%" stop-color="#6B5118"/>
    </linearGradient>
    <linearGradient id="plgV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F4E49C"/>
      <stop offset="100%" stop-color="#7A5E1A"/>
    </linearGradient>
    <linearGradient id="plbg" cx="50%" cy="34%" r="68%">
      <stop offset="0%"   stop-color="#254637"/>
      <stop offset="100%" stop-color="#0C1C11"/>
    </linearGradient>
    <radialGradient id="plbgR" cx="50%" cy="34%" r="68%">
      <stop offset="0%"   stop-color="#254637"/>
      <stop offset="100%" stop-color="#0C1C11"/>
    </radialGradient>
    <path id="pltArcB" d="M 13 70 A 57 57 0 0 0 127 70"/>
  </defs>

  <!-- ── Emblem circle (scaled 200→114, centered at 70,70) ── -->
  <g transform="translate(70,70) scale(0.57) translate(-100,-100)">
    <!-- Background -->
    <circle cx="100" cy="100" r="100" fill="#060E08"/>
    <circle cx="100" cy="100" r="98"  fill="url(#plbgR)"/>
    <!-- Rings -->
    <circle cx="100" cy="100" r="97" fill="none" stroke="url(#plgH)" stroke-width="2"/>
    <circle cx="100" cy="100" r="86" fill="none" stroke="#C9A24B"
            stroke-width="0.8" stroke-dasharray="2.2 3.5" opacity="0.50"/>
    <!-- Gold arc -->
    <path d="M 31 68 A 76 76 0 0 1 169 68"
          fill="none" stroke="url(#plgH)" stroke-width="7" stroke-linecap="round"/>
    <!-- Three feathers -->
    <path d="M 97 148 C 92 112 95 74 100 36 C 105 74 108 112 103 148 Z" fill="url(#plgV)"/>
    <path d="M 97 148 C 92 112 95 74 100 36 C 105 74 108 112 103 148 Z"
          fill="#D4AB52" opacity="0.82" transform="rotate(-27 100 148)"/>
    <path d="M 97 148 C 92 112 95 74 100 36 C 105 74 108 112 103 148 Z"
          fill="#D4AB52" opacity="0.82" transform="rotate(27 100 148)"/>
    <!-- Quill knot -->
    <circle cx="100" cy="148" r="2.5" fill="url(#plgV)"/>
    <!-- Leaf accents -->
    <path d="M 40 128 C 22 112 24 90 39 80 C 48 92 50 112 40 128 Z"
          fill="#192F22" stroke="#2A4E37" stroke-width="0.8"/>
    <path d="M 160 128 C 178 112 176 90 161 80 C 152 92 150 112 160 128 Z"
          fill="#192F22" stroke="#2A4E37" stroke-width="0.8"/>
    <!-- Bottom text -->
    <text font-family="'Palatino Linotype',Palatino,Georgia,serif"
          font-size="9.5" font-weight="600" letter-spacing="2.2" fill="url(#plgH)" opacity="0.88">
      <textPath href="#pltArcB" startOffset="50%" text-anchor="middle">PARAÍSO · DE · AVES</textPath>
    </text>
  </g>

  <!-- ── Vertical gold separator ── -->
  <line x1="152" y1="18" x2="152" y2="122" stroke="url(#plgH)" stroke-width="1"/>

  <!-- ── Wordmark ── -->
  <!-- "Paraíso" -->
  <text x="168" y="80" dominant-baseline="auto"
        font-family="'Playfair Display','Palatino Linotype','Book Antiqua',Georgia,serif"
        font-size="58" font-weight="700" letter-spacing="0.5" fill="#FFFFFF">Paraíso</text>
  <!-- Decorative line left of "de Aves" -->
  <line x1="168" y1="98" x2="200" y2="98" stroke="url(#plgH)" stroke-width="1"/>
  <!-- "de Aves" -->
  <text x="206" y="108" dominant-baseline="auto"
        font-family="'Playfair Display','Palatino Linotype',Georgia,serif"
        font-size="22" font-weight="400" letter-spacing="2.5" fill="url(#plgH)">de Aves</text>
  <!-- Decorative line right of "de Aves" -->
  <line x1="288" y1="98" x2="320" y2="98" stroke="url(#plgH)" stroke-width="1"/>
  <!-- Tagline -->
  <text x="168" y="125" dominant-baseline="auto"
        font-family="'Palatino Linotype',Palatino,Georgia,serif"
        font-size="9" letter-spacing="4" fill="#C9A24B" opacity="0.60">CRIADOR REGISTRADO · ESPAÑA</text>
</svg>
