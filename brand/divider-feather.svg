<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 80" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="dfg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"    stop-color="#C9A24B" stop-opacity="0"/>
      <stop offset="20%"   stop-color="#C9A24B" stop-opacity="0.7"/>
      <stop offset="42%"   stop-color="#E8C97A" stop-opacity="1"/>
      <stop offset="50%"   stop-color="#E8C97A" stop-opacity="0"/>
      <stop offset="58%"   stop-color="#E8C97A" stop-opacity="1"/>
      <stop offset="80%"   stop-color="#C9A24B" stop-opacity="0.7"/>
      <stop offset="100%"  stop-color="#C9A24B" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="dfgV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F4E49C"/>
      <stop offset="100%" stop-color="#7A5E1A"/>
    </linearGradient>
  </defs>

  <!-- Horizontal rule -->
  <line x1="0" y1="40" x2="1200" y2="40" stroke="url(#dfg)" stroke-width="1"/>

  <!-- Three feather mark centred at (600, 40) -->
  <!-- Base at (600, 63), tips reaching toward (600, 14) -->
  <g transform="translate(600,63) scale(0.24) translate(-100,-148)">
    <!-- Centre feather -->
    <path d="M 97 148 C 92 112 95 74 100 36 C 105 74 108 112 103 148 Z" fill="url(#dfgV)"/>
    <!-- Left -->
    <path d="M 97 148 C 92 112 95 74 100 36 C 105 74 108 112 103 148 Z"
          fill="#D4AB52" opacity="0.80" transform="rotate(-27 100 148)"/>
    <!-- Right -->
    <path d="M 97 148 C 92 112 95 74 100 36 C 105 74 108 112 103 148 Z"
          fill="#D4AB52" opacity="0.80" transform="rotate(27 100 148)"/>
    <!-- Mini arc -->
    <path d="M 31 68 A 76 76 0 0 1 169 68"
          fill="none" stroke="#C9A24B" stroke-width="9" stroke-linecap="round"/>
    <circle cx="100" cy="148" r="4" fill="url(#dfgV)"/>
  </g>

  <!-- Flanking ornament dots -->
  <circle cx="540" cy="40" r="2"   fill="#C9A24B" opacity="0.55"/>
  <circle cx="524" cy="40" r="1.4" fill="#C9A24B" opacity="0.35"/>
  <circle cx="660" cy="40" r="2"   fill="#C9A24B" opacity="0.55"/>
  <circle cx="676" cy="40" r="1.4" fill="#C9A24B" opacity="0.35"/>
</svg>
