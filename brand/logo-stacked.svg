<?xml version="1.0" encoding="UTF-8"?>
<!-- Paraíso de Aves — Stacked Logo (for square/compact spaces) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280"
     role="img" aria-label="Paraíso de Aves — stacked logo">
  <title>Paraíso de Aves</title>
  <defs>
    <linearGradient id="slgH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6B5118"/>
      <stop offset="40%"  stop-color="#E8C97A"/>
      <stop offset="60%"  stop-color="#D4AB52"/>
      <stop offset="100%" stop-color="#6B5118"/>
    </linearGradient>
    <linearGradient id="slgV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F4E49C"/>
      <stop offset="100%" stop-color="#7A5E1A"/>
    </linearGradient>
    <radialGradient id="slbgR" cx="50%" cy="34%" r="68%">
      <stop offset="0%"   stop-color="#254637"/>
      <stop offset="100%" stop-color="#0C1C11"/>
    </radialGradient>
    <path id="sltArcB" d="M 20 100 A 80 80 0 0 0 180 100"/>
  </defs>

  <!-- ── Emblem (full 200×200, centered at 120,108 → translate to fit) ── -->
  <g transform="translate(20,4)">
    <!-- Background -->
    <circle cx="100" cy="100" r="100" fill="#060E08"/>
    <circle cx="100" cy="100" r="98"  fill="url(#slbgR)"/>
    <!-- Rings -->
    <circle cx="100" cy="100" r="97" fill="none" stroke="url(#slgH)" stroke-width="2"/>
    <circle cx="100" cy="100" r="86" fill="none" stroke="#C9A24B"
            stroke-width="0.65" stroke-dasharray="2.2 3.5" opacity="0.50"/>
    <!-- Gold arc -->
    <path d="M 31 68 A 76 76 0 0 1 169 68"
          fill="none" stroke="url(#slgH)" stroke-width="6.5" stroke-linecap="round"/>
    <!-- Three feathers -->
    <path d="M 97 148 C 92 112 95 74 100 36 C 105 74 108 112 103 148 Z" fill="url(#slgV)"/>
    <path d="M 97 148 C 92 112 95 74 100 36 C 105 74 108 112 103 148 Z"
          fill="#D4AB52" opacity="0.82" transform="rotate(-27 100 148)"/>
    <path d="M 97 148 C 92 112 95 74 100 36 C 105 74 108 112 103 148 Z"
          fill="#D4AB52" opacity="0.82" transform="rotate(27 100 148)"/>
    <circle cx="100" cy="148" r="2.4" fill="url(#slgV)"/>
    <!-- Leaf accents -->
    <path d="M 40 128 C 22 112 24 90 39 80 C 48 92 50 112 40 128 Z" fill="#192F22" stroke="#2A4E37" stroke-width="0.8"/>
    <path d="M 160 128 C 178 112 176 90 161 80 C 152 92 150 112 160 128 Z" fill="#192F22" stroke="#2A4E37" stroke-width="0.8"/>
    <!-- Bottom text -->
    <text font-family="'Palatino Linotype',Palatino,Georgia,serif"
          font-size="9.5" font-weight="600" letter-spacing="2.4" fill="url(#slgH)" opacity="0.90">
      <textPath href="#sltArcB" startOffset="50%" text-anchor="middle">PARAÍSO · DE · AVES</textPath>
    </text>
  </g>

  <!-- ── Gold rule ── -->
  <line x1="60" y1="218" x2="180" y2="218" stroke="url(#slgH)" stroke-width="0.8"/>

  <!-- ── Wordmark ── -->
  <text x="120" y="246"
        text-anchor="middle"
        font-family="'Playfair Display','Palatino Linotype',Georgia,serif"
        font-size="34" font-weight="700" letter-spacing="0.3" fill="#FFFFFF">Paraíso</text>
  <text x="120" y="268"
        text-anchor="middle"
        font-family="'Playfair Display','Palatino Linotype',Georgia,serif"
        font-size="16" font-weight="400" letter-spacing="3.5" fill="url(#slgH)">de Aves</text>

  <!-- Small ornament dots flanking wordmark -->
  <circle cx="52"  cy="256" r="1.5" fill="#C9A24B" opacity="0.40"/>
  <circle cx="188" cy="256" r="1.5" fill="#C9A24B" opacity="0.40"/>
</svg>
