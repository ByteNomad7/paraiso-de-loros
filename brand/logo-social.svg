<?xml version="1.0" encoding="UTF-8"?>
<!-- Paraíso de Aves — Social Media Profile Icon (1:1 square) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500"
     role="img" aria-label="Paraíso de Aves — social media icon">
  <title>Paraíso de Aves</title>
  <defs>
    <linearGradient id="ssgH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6B5118"/>
      <stop offset="40%"  stop-color="#E8C97A"/>
      <stop offset="60%"  stop-color="#D4AB52"/>
      <stop offset="100%" stop-color="#6B5118"/>
    </linearGradient>
    <linearGradient id="ssgV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F4E49C"/>
      <stop offset="100%" stop-color="#7A5E1A"/>
    </linearGradient>
    <radialGradient id="ssbg" cx="50%" cy="35%" r="70%">
      <stop offset="0%"   stop-color="#1B3D2F"/>
      <stop offset="100%" stop-color="#0A1E14"/>
    </radialGradient>
    <radialGradient id="ssemblem" cx="50%" cy="34%" r="68%">
      <stop offset="0%"   stop-color="#254637"/>
      <stop offset="100%" stop-color="#0C1C11"/>
    </radialGradient>
    <path id="sst" d="M 100 250 A 150 150 0 0 0 400 250"/>
  </defs>

  <!-- Dark green background -->
  <rect width="500" height="500" fill="url(#ssbg)"/>
  <!-- Subtle corner ornaments -->
  <rect x="12" y="12" width="476" height="476" rx="0" fill="none"
        stroke="url(#ssgH)" stroke-width="1.5"/>
  <rect x="18" y="18" width="464" height="464" rx="0" fill="none"
        stroke="#C9A24B" stroke-width="0.6" stroke-dasharray="3 4" opacity="0.35"/>

  <!-- Emblem (200×200 scaled to 300×300, centered at 250,230) -->
  <g transform="translate(250,230) scale(1.5) translate(-100,-100)">
    <!-- Background circle -->
    <circle cx="100" cy="100" r="100" fill="#060E08"/>
    <circle cx="100" cy="100" r="98"  fill="url(#ssemblem)"/>
    <!-- Rings -->
    <circle cx="100" cy="100" r="97" fill="none" stroke="url(#ssgH)" stroke-width="2"/>
    <circle cx="100" cy="100" r="86" fill="none" stroke="#C9A24B"
            stroke-width="0.65" stroke-dasharray="2.2 3.5" opacity="0.50"/>
    <!-- Gold arc -->
    <path d="M 31 68 A 76 76 0 0 1 169 68"
          fill="none" stroke="url(#ssgH)" stroke-width="6.5" stroke-linecap="round"/>
    <!-- Three feathers -->
    <path d="M 97 148 C 92 112 95 74 100 36 C 105 74 108 112 103 148 Z" fill="url(#ssgV)"/>
    <path d="M 97 148 C 92 112 95 74 100 36 C 105 74 108 112 103 148 Z"
          fill="#D4AB52" opacity="0.82" transform="rotate(-27 100 148)"/>
    <path d="M 97 148 C 92 112 95 74 100 36 C 105 74 108 112 103 148 Z"
          fill="#D4AB52" opacity="0.82" transform="rotate(27 100 148)"/>
    <circle cx="100" cy="148" r="2.4" fill="url(#ssgV)"/>
    <!-- Leaf accents -->
    <path d="M 40 128 C 22 112 24 90 39 80 C 48 92 50 112 40 128 Z" fill="#192F22" stroke="#2A4E37" stroke-width="0.8"/>
    <path d="M 160 128 C 178 112 176 90 161 80 C 152 92 150 112 160 128 Z" fill="#192F22" stroke="#2A4E37" stroke-width="0.8"/>
  </g>

  <!-- Bottom wordmark -->
  <line x1="120" y1="400" x2="380" y2="400" stroke="url(#ssgH)" stroke-width="1"/>
  <text x="250" y="432" text-anchor="middle"
        font-family="'Playfair Display','Palatino Linotype',Georgia,serif"
        font-size="40" font-weight="700" fill="#FFFFFF" letter-spacing="0.5">Paraíso</text>
  <text x="250" y="462" text-anchor="middle"
        font-family="'Playfair Display','Palatino Linotype',Georgia,serif"
        font-size="20" font-weight="400" letter-spacing="5" fill="url(#ssgH)">de Aves</text>
  <line x1="120" y1="472" x2="380" y2="472" stroke="url(#ssgH)" stroke-width="1"/>
</svg>
